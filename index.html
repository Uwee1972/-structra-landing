<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Structra – Build Smarter</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*, *::before, *::after { box-sizing:border-box;margin:0;padding:0; }

html,body{
font-family:'Inter',sans-serif;
background:#060f1c;
color:#fff;
min-height:100vh;
overflow-x:hidden;
}

/* Blueprint grid */
body::before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(30,100,200,.07) 1px,transparent 1px),
linear-gradient(90deg,rgba(30,100,200,.07) 1px,transparent 1px);
background-size:40px 40px;
pointer-events:none;
z-index:0;
}

body::after{
content:'';
position:fixed;
inset:8px;
border:1px solid rgba(30,120,255,.2);
border-radius:16px;
pointer-events:none;
z-index:0;
}

.page-wrapper{
position:relative;
z-index:1;
max-width:1200px;
margin:0 auto;
padding:0 3rem;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:1.4rem 0;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

/* YOUR LOGO */
.logo-img{
height:48px;
width:auto;
object-fit:contain;
}

.logo-text{
display:flex;
flex-direction:column;
line-height:1.2;
}

.logo-text strong{
font-size:1.35rem;
font-weight:700;
}

.logo-text small{
font-size:.62rem;
color:#6b8fa8;
}

nav{
display:flex;
align-items:center;
gap:2.2rem;
}

nav a{
text-decoration:none;
color:#c8daea;
font-size:.92rem;
font-weight:500;
}

nav a.active{
color:#fff;
border-bottom:2px solid #1a7fff;
padding-bottom:3px;
}

.btn-login{
background:#1a7fff;
color:#fff;
border:none;
padding:.52rem 1.3rem;
border-radius:50px;
font-size:.88rem;
font-weight:600;
cursor:pointer;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:5rem 0 2.5rem;
gap:3rem;
}

.hero-left{
flex:1;
max-width:500px;
}

.hero-left h2{
font-size:3rem;
font-weight:800;
line-height:1.15;
margin-bottom:1rem;
}

.subtitle{
font-size:1rem;
color:#8aaec8;
margin-bottom:2rem;
}

.hero-buttons{
display:flex;
gap:.9rem;
}

.btn-primary{
background:#1a7fff;
color:#fff;
border:none;
padding:.72rem 1.7rem;
border-radius:50px;
font-weight:600;
cursor:pointer;
}

.btn-outline{
background:transparent;
border:2px solid rgba(255,255,255,.65);
color:#fff;
padding:.68rem 1.7rem;
border-radius:50px;
font-weight:600;
cursor:pointer;
}

/* CITY */

.hero-right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.city-wrap{
width:400px;
height:400px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.city-wrap::before{
content:'';
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:260px;
height:60px;
background:radial-gradient(ellipse,rgba(0,140,255,.35)0%,transparent 70%);
border-radius:50%;
animation:glow 3s ease-in-out infinite;
}

@keyframes glow{
0%,100%{opacity:.6;transform:translateX(-50%) scaleX(1);}
50%{opacity:1;transform:translateX(-50%) scaleX(1.1);}
}

/* TOOL GRID */

.tools-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:1.2rem;
padding-bottom:4rem;
}

.tool-card{
background:rgba(255,255,255,.055);
border:1px solid rgba(255,255,255,.1);
border-radius:20px;
padding:1.6rem 1.3rem;
display:flex;
flex-direction:column;
gap:.75rem;
transition:.25s;
}

.tool-card:hover{
transform:translateY(-4px);
box-shadow:0 12px 30px rgba(0,100,255,.15);
}

.card-btn{
background:#1a7fff;
color:#fff;
border:none;
padding:.48rem 1.1rem;
border-radius:50px;
font-size:.82rem;
font-weight:600;
cursor:pointer;
width:fit-content;
}

footer{
text-align:center;
padding:1.5rem 0 2rem;
font-size:.78rem;
color:#3a5568;
border-top:1px solid rgba(255,255,255,.06);
}

/* MOBILE */

@media(max-width:768px){

.hero{
flex-direction:column;
text-align:center;
}

.hero-left h2{
font-size:2.2rem;
}

nav{
display:none;
}

.tools-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="page-wrapper">

<header>

<div class="logo">

<img src="logo.png" alt="Structra Logo" class="logo-img">

<div class="logo-text">
<strong>Structra</strong>
<small>A platform by Structra Technologies</small>
</div>

</div>

<nav>
<a href="#" class="active">Platform</a>
<a href="#">Products</a>
<a href="#">About</a>
</nav>

<button class="btn-login">Log In</button>

</header>

<section class="hero">

<div class="hero-left">

<h2>Build Smarter with Structra</h2>

<p class="subtitle">
AI-powered tools for construction and property insights
</p>

<div class="hero-buttons">
<button class="btn-primary">Get Started</button>
<button class="btn-outline">View Products</button>
</div>

</div>

<div class="hero-right">

<div class="city-wrap">

<svg viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg">

<rect x="178" y="70" width="44" height="230" fill="#0a5bd9"/>
<rect x="155" y="145" width="22" height="155" fill="#0d78ff"/>
<rect x="222" y="155" width="22" height="145" fill="#0d78ff"/>
<rect x="110" y="175" width="30" height="125" fill="#094fbf"/>
<rect x="258" y="175" width="30" height="125" fill="#094fbf"/>

</svg>

</div>

</div>

</section>

<div class="connect-banner">

Connect property buyers, inspectors, builders, and subcontractors in one AI platform

</div>

<footer>

© 2024 Structra Technologies. All rights reserved.

</footer>

</div>

</body>
</html>
